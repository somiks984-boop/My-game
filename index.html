            <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP CASINO 777 | BD OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010103; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .gold-grad { background: linear-gradient(135deg, #ffd700, #b8860b); color: #000; font-weight: 900; }
        .game-card { background: #12121a; border: 1px solid #222; border-radius: 20px; transition: 0.3s; position: relative; overflow: hidden; }
        .game-card:hover { border-color: #ffd700; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1); }
        .live-chip { background: rgba(226, 19, 110, 0.2); border-left: 4px solid #e2136e; animation: slide 4s infinite; }
        @keyframes slide { 0%, 100% { transform: translateY(50px); opacity: 0; } 10%, 90% { transform: translateY(0); opacity: 1; } }
        .hidden { display: none; }
        .grid-cell { aspect-ratio: 1; background: #1e1e2d; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.2s; border: 1px solid #333; }
        .grid-cell:active { transform: scale(0.9); }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-[#050508]/90 backdrop-blur-md p-4 border-b border-yellow-900/30 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic text-yellow-500 tracking-tighter">VIP CASINO</h1>
            <p class="text-[7px] text-gray-500 uppercase tracking-[3px]">The King of Betting</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-black/80 px-4 py-1 rounded-2xl border border-yellow-600/30 text-center">
                <p class="text-[8px] text-gray-400 uppercase">ব্যালেন্স</p>
                <p class="text-lg font-black text-yellow-400">৳<span id="globalBal">500</span></p>
            </div>
            <button onclick="alert('বিকাশ নাম্বার: ০১৭XXXXXXXX')" class="gold-grad px-3 py-2 rounded-xl text-[10px] shadow-lg">ডিপোজিট</button>
        </div>
    </header>

    <main id="lobby" class="p-4">
        <div class="mb-6 rounded-3xl bg-gradient-to-r from-purple-900/40 to-blue-900/40 p-6 border border-white/10 relative">
            <h2 class="text-xl font-bold mb-2">৩০০% ওয়েলকাম বোনাস! 🎰</h2>
            <p class="text-xs text-gray-400">প্রথম ডিপোজিটে পান ৩ গুণ টাকা সরাসরি বোনাস।</p>
            <div class="absolute -right-4 -bottom-4 opacity-20 text-8xl">🔥</div>
        </div>

        <h3 class="font-bold text-lg mb-4 border-l-4 border-yellow-500 pl-3">সবগুলো গেম (৩০০+)</h3>
        <div class="grid grid-cols-2 gap-4" id="gameGrid">
            </div>
    </main>

    <div id="gamePlay" class="hidden p-4 text-center">
        <button onclick="backToLobby()" class="mb-6 text-xs text-gray-500 flex items-center gap-2 uppercase tracking-widest">< 🏠 লবিতে ফিরুন</button>
        <div class="bg-[#12121a] p-6 rounded-[40px] border border-yellow-600/20 shadow-2xl">
            <h2 id="gName" class="text-2xl font-black mb-6 text-yellow-500 tracking-widest">TREASURE MINES</h2>
            <div class="mb-6">
                <p class="text-[10px] text-gray-500 uppercase mb-2">বাজির পরিমাণ লিখুন</p>
                <input type="number" id="betAmt" value="100" class="w-full bg-black border border-gray-800 p-4 rounded-2xl text-center text-xl font-black text-yellow-500 focus:border-yellow-500 outline-none">
            </div>
            <div class="grid grid-cols-5 gap-2 mb-6" id="mineGrid"></div>
            <button id="startBtn" onclick="initMines()" class="gold-grad w-full p-5 rounded-2xl text-sm font-black shadow-xl uppercase">গেম শুরু করুন</button>
            <button id="cashBtn" onclick="claimWin()" class="hidden bg-green-600 w-full p-5 rounded-2xl text-sm font-black shadow-xl uppercase mt-2">৳ ক্যাশ আউট করুন</button>
        </div>
    </div>

    <div id="winner" class="fixed bottom-20 left-4 right-4 z-50 live-chip p-3 rounded-2xl flex items-center gap-3 backdrop-blur-md">
        <div class="text-2xl">🏆</div>
        <div>
            <p class="text-[9px] text-gray-400"><span id="uName" class="text-white font-bold">Rifat</span> এইমাত্র জিতলেন</p>
            <p class="text-sm font-black text-green-400">৳<span id="uAmt">৪৫০০</span></p>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/90 border-t border-gray-800 flex justify-around py-3 backdrop-blur-md">
        <div onclick="backToLobby()" class="text-yellow-500 flex flex-col items-center"><span class="text-xl">🏠</span><p class="text-[9px]">হোম</p></div>
        <div class="text-gray-500 flex flex-col items-center"><span class="text-xl">📊</span><p class="text-[9px]">হিস্ট্রি</p></div>
        <div class="text-gray-500 flex flex-col items-center"><span class="text-xl">👤</span><p class="text-[9px]">প্রোফাইল</p></div>
    </nav>

    <script>
        let balance = 500;
        let isPlay = false, bombs = [], clicked = 0, bet = 0;
        const gList = ["Royal Slots", "Crazy Mines", "Golden Dice", "Fruit Spin", "Mega Tiger", "Dragon Rush"];
        const icons = ["🎰", "💣", "🎲", "🍓", "🐯", "🐉"];

        // ৩০০ গেম তৈরি
        const grid = document.getElementById('gameGrid');
        for(let i=0; i<300; i++) {
            let n = gList[i % 6];
            let ic = icons[i % 6];
            grid.innerHTML += `
                <div onclick="enterGame('${n}')" class="game-card p-6 text-center">
                    <div class="text-5xl mb-4">${ic}</div>
                    <p class="text-[10px] font-black uppercase text-gray-300">${n} ${i+1}</p>
                    <div class="mt-2 text-[8px] text-green-500 font-bold uppercase">Win Rate: 98.4%</div>
                    <button class="mt-4 w-full py-2 gold-grad rounded-lg text-[9px] uppercase">খেলুন</button>
                </div>`;
        }

        function enterGame(n) {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('gamePlay').classList.remove('hidden');
            document.getElementById('gName').innerText = n;
            buildGrid();
        }

        function backToLobby() {
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('gamePlay').classList.add('hidden');
        }

        function buildGrid() {
            const mGrid = document.getElementById('mineGrid');
            mGrid.innerHTML = '';
            for(let i=0; i<25; i++) {
                let d = document.createElement('div'); d.className = 'grid-cell';
                d.innerText = '⭐';
                d.onclick = () => tap(i, d);
                mGrid.appendChild(d);
            }
        }

        function initMines() {
            bet = parseInt(document.getElementById('betAmt').value);
            if(bet > balance || bet <= 0) return alert("ব্যালেন্স নেই!");
            isPlay = true; clicked = 0; bombs = [];
            while(bombs.length < 9) { // ৯টি বোমা মানে আপনার লাভ বেশি!
                let r = Math.floor(Math.random()*25);
                if(!bombs.includes(r)) bombs.push(r);
            }
            buildGrid();
            document.getElementById('startBtn').classList.add('hidden');
        }

        function tap(i, el) {
            if(!isPlay) return;
            if(bombs.includes(i)) {
                el.innerText = '💣'; el.style.background = '#ff4d4d';
                balance -= bet; updateUI();
                isPlay = false; alert("ওহ নো! বোমা ফেটেছে।");
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('cashBtn').classList.add('hidden');
            } else {
                el.innerText = '💎'; el.style.background = '#00c853';
                clicked++;
                document.getElementById('cashBtn').classList.remove('hidden');
            }
        }

        function claimWin() {
            let win = bet * (1 + (clicked * 0.3));
            balance += (win - bet); updateUI();
            isPlay = false; alert("অভিনন্দন! আপনি জিতেছেন ৳" + Math.floor(win));
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('cashBtn').classList.add('hidden');
        }

        function updateUI() { document.getElementById('globalBal').innerText = Math.floor(balance); }

        // লাইভ উইনার ফেক সিস্টেম
        const users = ["Sumon", "Rony", "Hridoy", "Nila", "Tarek"];
        setInterval(() => {
            document.getElementById('uName').innerText = users[Math.floor(Math.random()*users.length)];
            document.getElementById('uAmt').innerText = Math.floor(Math.random()*5000 + 200);
        }, 5000);
    </script>
</body>
        </html>
