<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Mobile Game</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
}

.box{
width:60px;
height:60px;
position:absolute;
border-radius:12px;
}

#player{background:lime;}
#bomb{background:red;}
#bonus{background:gold;}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

button{
padding:10px 20px;
font-size:16px;
margin:5px;
}

#ui{
position:fixed;
top:10px;
left:10px;
font-size:14px;
display:none;
}

#timer{
position:fixed;
top:10px;
right:10px;
display:none;
}
</style>
</head>

<body>

<div id="menu">
<h1>Ultimate Game</h1>
<button onclick="start()">Start Game</button>
</div>

<div id="ui">
Score: <span id="score">0</span><br>
High: <span id="high">0</span><br>
Level: <span id="level">1</span><br>
Lives: <span id="lives">3</span><br>
<button onclick="pause()">Pause</button>
<button onclick="restart()">Restart</button>
</div>

<div id="timer">Time: 30</div>

<div id="player" class="box"></div>
<div id="bomb" class="box"></div>
<div id="bonus" class="box"></div>

<script>
let score=0;
let level=1;
let lives=3;
let time=30;
let speed=1000;
let running=false;

let high=localStorage.getItem("high")||0;
document.getElementById("high").innerText=high;

const player=document.getElementById("player");
const bomb=document.getElementById("bomb");
const bonus=document.getElementById("bonus");

function move(el){
let x=Math.random()*(window.innerWidth-60);
let y=Math.random()*(window.innerHeight-60);
el.style.left=x+"px";
el.style.top=y+"px";
}

function beep(){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.1);
}

function start(){
running=true;
document.getElementById("menu").style.display="none";
document.getElementById("ui").style.display="block";
document.getElementById("timer").style.display="block";
}

player.onclick=()=>{
if(!running)return;
score++;
beep();

player.style.background=
"rgb("+Math.random()*255+","+
Math.random()*255+","+
Math.random()*255+")";

if(score%5==0){
level++;
speed-=80;
if(speed<300) speed=300;
document.getElementById("level").innerText=level;
}

document.getElementById("score").innerText=score;
move(player);
}

bomb.onclick=()=>{
if(!running)return;
lives--;
beep();

document.getElementById("lives").innerText=lives;

if(lives<=0){
gameOver();
}

move(bomb);
}

bonus.onclick=()=>{
if(!running)return;
score+=3;
beep();
document.getElementById("score").innerText=score;
move(bonus);
}

function gameOver(){
running=false;

if(score>high){
localStorage.setItem("high",score);
}

alert("Game Over\nScore: "+score);
location.reload();
}

function pause(){
running=!running;
}

function restart(){
location.reload();
}

setInterval(()=>{
if(!running)return;
move(player);
move(bomb);
move(bonus);
},speed);

setInterval(()=>{
if(!running)return;
time--;
document.getElementById("timer").innerText="Time: "+time;

if(time<=0){
gameOver();
}
},1000);

move(player);
move(bomb);
move(bonus);
</script>

</body>
</html>
