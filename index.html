<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaWin 300+ LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white text-center p-10">
    <h1 class="text-4xl font-black text-yellow-500 mb-5 italic">CASINO HUB 300+</h1>
    <div class="grid grid-cols-2 gap-4" id="g"></div>
    <script>
        for(let i=1; i<=300; i++){
            document.getElementById('g').innerHTML += `
            <div class="bg-gray-900 p-5 rounded-xl border border-gray-800" onclick="alert('গেম লোড হচ্ছে...')">
                <div class="text-3xl mb-2">🎰</div>
                <p class="text-[10px] font-bold">GAME #${i+100}</p>
                <button class="mt-2 bg-pink-600 px-3 py-1 rounded text-[8px] font-bold">PLAY NOW</button>
            </div>`;
        }
    </script>
</body>
</html>
