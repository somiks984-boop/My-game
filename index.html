<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWPK-LUCK | BD OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #051d12; color: #fff; font-family: sans-serif; margin: 0; }
        .login-screen { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://source.unsplash.com/1600x900/?casino,dark'); background-size: cover; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .input-style { background: #1a3c2a; border: 1px solid #2d5a3f; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; outline: none; }
        .btn-login { background: #28a745; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; color: #fff; border: none; cursor: pointer; }
        .game-card { background: #0a2e1e; border-radius: 12px; overflow: hidden; border: 1px solid #1e4d36; text-align: center; padding-bottom: 10px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #051d12; border-top: 1px solid #1e4d36; display: flex; justify-content: space-around; padding: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-screen">
        <h1 class="text-3xl font-black text-yellow-500 mb-8 tracking-tighter">NEWPK-LUCK</h1>
        <div class="w-full max-w-xs">
            <input type="text" id="username" placeholder="ব্যবহারকারী নাম" class="input-style">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="input-style">
            <button onclick="doLogin()" class="btn-login">লগইন</button>
            <div class="flex justify-between mt-4 text-xs text-gray-400">
                <span>অ্যাকাউন্ট তৈরি করুন</span>
                <span class="text-yellow-500">সেবা</span>
            </div>
        </div>
    </div>

    <div id="mainLobby" class="hidden">
        <div class="p-4 flex justify-between items-center bg-[#0a2e1e]">
            <div class="text-yellow-500 font-bold">NEWPK-LUCK</div>
            <button class="bg-green-600 text-[10px] px-3 py-1 rounded-full font-bold">ডাউনলোড +১৮৮</button>
        </div>

        <div class="p-3">
            <div class="rounded-xl bg-gradient-to-r from-green-800 to-green-600 h-32 flex items-center justify-center border border-yellow-500 shadow-lg">
                <p class="font-black text-center italic text-xl">প্রতিদিন এনভেলাপ <br> আপনার জন্য অপেক্ষা করছে!</p>
            </div>
        </div>

        <div class="px-4 py-2 flex justify-between items-center bg-[#051d12]">
            <div>
                <p class="text-[10px] text-yellow-500">Hello, <span id="userDisp">nasuvai</span></p>
                <p class="font-bold">৳ 0.38 🔄</p>
            </div>
            <div class="flex gap-4">
                <button class="text-center text-[10px] text-yellow-500">💰 ডিপোজিট</button>
                <button class="text-center text-[10px]">🏦 উত্তোলন</button>
            </div>
        </div>

        <div class="p-4 grid grid-cols-3 gap-3 mb-20">
            <div class="game-card" onclick="alert('Aviator গেমটি ওপেন হচ্ছে...')">
                <div class="h-20 bg-black/20 flex items-center justify-center text-3xl">✈️</div>
                <p class="text-[10px] font-bold mt-2">এভিয়েটর</p>
            </div>
            <div class="game-card" onclick="alert('Super Ace গেমটি ওপেন হচ্ছে...')">
                <div class="h-20 bg-black/20 flex items-center justify-center text-3xl">🃏</div>
                <p class="text-[10px] font-bold mt-2">সুপার এস</p>
            </div>
            <div class="game-card" onclick="alert('Mines গেমটি ওপেন হচ্ছে...')">
                <div class="h-20 bg-black/20 flex items-center justify-center text-3xl">💣</div>
                <p class="text-[10px] font-bold mt-2">মাইনস</p>
            </div>
            </div>

        <div class="nav-bottom">
            <div class="text-yellow-500 flex flex-col items-center"><span class="text-xl">🏠</span><p class="text-[8px]">হোম</p></div>
            <div class="text-gray-500 flex flex-col items-center"><span class="text-xl">🎁</span><p class="text-[8px]">প্রমোশন</p></div>
            <div class="text-gray-500 flex flex-col items-center"><span class="text-xl">👤</span><p class="text-[8px]">সদস্য</p></div>
        </div>
    </div>

    <script>
        function doLogin() {
            const user = document.getElementById('username').value;
            if(user === "") return alert("ইউজার নাম লিখুন!");
            
            document.getElementById('userDisp').innerText = user;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainLobby').classList.remove('hidden');
        }
    </script>
</body>
</html>
